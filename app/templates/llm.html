<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f9f7ff 0%, #f0ebff 25%, #e8e0ff 50%, #e0d5ff 75%, #d8caff 100%);
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 1rem 2rem;
            margin: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.1);
        }
        
        .glass-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #8a2be2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .glass-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .glass-nav-item {
            color: #6b46c1;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .glass-nav-item:hover, .glass-nav-item.active {
            color: #8a2be2;
            background: rgba(138, 43, 226, 0.1);
            transform: translateY(-2px);
        }
        
        .glass-status {
            background: rgba(123, 97, 255, 0.1);
            color: #7b61ff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(123, 97, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-pulse {
            width: 8px;
            height: 8px;
            background: #7b61ff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
       
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .main-header {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8a2be2 0%, #7b68ee 50%, #9370db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 2rem 0 1rem 0;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
            letter-spacing: -0.02em;
        }
        
        .tagline {
            text-align: center;
            color: #6b46c1;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            font-weight: 500;
        }
        
        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 65vh;
            max-height: 65vh;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(138, 43, 226, 0.1);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            align-self: flex-end;
        }
        
        .bot-message {
            align-self: flex-start;
        }
        
        .message-content {
            padding: 1rem 1.5rem;
            border-radius: 20px;
            line-height: 1.5;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.1);
        }
        
        .user-message .message-content {
            background: linear-gradient(135deg, #8a2be2 0%, #7b68ee 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message .message-content {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(138, 43, 226, 0.1);
            border-bottom-left-radius: 5px;
            color: #333;
        }
        
        .message-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            flex-shrink: 0;
        }
        
        .user-message .message-icon {
            background: linear-gradient(135deg, #8a2be2 0%, #7b68ee 100%);
            order: 2;
        }
        
        .bot-message .message-icon {
            background: rgba(138, 43, 226, 0.1);
            border: 1px solid rgba(138, 43, 226, 0.2);
            color: #8a2be2;
        }
        
        /* Input Area */
        .input-container {
            padding: 1.5rem;
            border-top: 1px solid rgba(138, 43, 226, 0.1);
            display: flex;
            gap: 1rem;
        }
        
        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 15px;
            color: #333;
            font-size: 1rem;
            padding: 1rem 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            border-color: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
        }
        
        .input-field::placeholder {
            color: rgba(107, 70, 193, 0.6);
        }
        
        .send-button {
            background: linear-gradient(135deg, #8a2be2 0%, #7b68ee 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.3);
        }
        
        .send-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4);
        }
        
        .send-button:active {
            transform: translateY(0);
        }
        
        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
       
        .paper-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(138, 43, 226, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.1);
            transition: all 0.3s ease;
        }
        
        .paper-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.15);
        }
        
        .paper-title {
            font-size: 1.2rem;
            color: #8a2be2;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .paper-authors {
            color: #6b46c1;
            margin-bottom: 0.8rem;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        .paper-summary {
            line-height: 1.5;
            color: #555;
            margin-bottom: 1rem;
        }
        
        .paper-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .paper-meta span {
            background: rgba(138, 43, 226, 0.1);
            color: #8a2be2;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid rgba(138, 43, 226, 0.2);
        }
        
        
        .progress-container {
            width: 100%;
            background-color: rgba(138, 43, 226, 0.1);
            border-radius: 10px;
            margin: 1rem 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 8px;
            background: linear-gradient(90deg, #8a2be2 0%, #7b68ee 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
       
        .status-message {
            padding: 1rem;
            border-radius: 12px;
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-warning {
            background-color: rgba(245, 158, 11, 0.12);
            color: #b45309;
            border: 1px solid rgba(245, 158, 11, 0.25);
        }
        
    
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #6b46c1;
            font-style: italic;
        }

    display: flex;
    justify-content: space-between;

    margin-bottom: 1rem;

}

        .typing-dots {
            display: flex;

        }
        
        .typing-dot {

            .send-button {

        .chat-messages::-webkit-scrollbar {

        }
        
        .chat-messages::-webkit-scrollbar-track {

        .chat-messages::-webkit-scrollbar-thumb {

    </style>
</head>
<body>
    
    <div class="glass-header">
        <div class="glass-logo">
            <i class="fas fa-microscope"></i> Research Assistant
        </div>
        <div class="glass-nav">
            <div class="glass-nav-item active">Dashboard</div>
            <div class="glass-nav-item">History</div>
            <div class="glass-nav-item">Settings</div>
            <div class="glass-nav-item">Help</div>
        </div>
        <div class="glass-status">
            <div class="status-pulse"></div>
            Online
        </div>
    </div>

    <div class="container">
        <h1 class="main-header">🔬 Research Paper Assistant</h1>
        <p class="tagline">Your Intelligent Literature Companion, powered by AI and RAG.</p>
        
       
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
               
                <div class="message bot-message">
                    <div class="message-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hello! I'm your research assistant. I can help you find and summarize research papers on any topic. What would you like to explore today?</p>
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" class="input-field" id="userInput" placeholder="Enter your research topic (e.g., quantum machine learning, transformer models)">
                <button class="send-button" id="sendButton">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </div>

    <script>
       document.addEventListener('DOMContentLoaded', function() {
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const glassStatus = document.querySelector('.glass-status');
    const API_BASE_URL = window.location.origin;
    let isGenerating = false;

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatInline(text) {
        let escaped = escapeHtml(text);
        escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        escaped = escaped.replace(/`(.+?)`/g, '<code>$1</code>');
        return escaped;
    }

    function renderMarkdown(markdown) {
        const lines = String(markdown || '').split('\n');
        const html = [];
        let inList = false;

        function closeList() {
            if (inList) {
                html.push('</ul>');
                inList = false;
            }
        }

        for (const rawLine of lines) {
            const line = rawLine.trim();

            if (!line) {
                closeList();
                continue;
            }

            if (line.startsWith('### ')) {
                closeList();
                html.push(`<h3>${formatInline(line.slice(4))}</h3>`);
                continue;
            }

            if (line.startsWith('## ')) {
                closeList();
                html.push(`<h2>${formatInline(line.slice(3))}</h2>`);
                continue;
            }

            if (line.startsWith('# ')) {
                closeList();
                html.push(`<h1>${formatInline(line.slice(2))}</h1>`);
                continue;
            }

            if (line.startsWith('- ') || line.startsWith('* ')) {
                if (!inList) {
                    html.push('<ul>');
                    inList = true;
                }
                html.push(`<li>${formatInline(line.slice(2))}</li>`);
                continue;
            }

            closeList();
            html.push(`<p>${formatInline(line)}</p>`);
        }

        closeList();
        return html.join('');
    }

    function setAppStatus(label, busy = false) {
        if (!glassStatus) return;
        const pulse = '<div class="status-pulse"></div>';
        glassStatus.innerHTML = `${pulse}${escapeHtml(label)}`;
        glassStatus.style.opacity = busy ? '0.85' : '1';
    }

    function addMessage(content, isUser = false, options = {}) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'} ${options.variant || ''}`.trim();

        const iconDiv = document.createElement('div');
        iconDiv.className = 'message-icon';
        iconDiv.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        if (typeof content === 'string') {
            contentDiv.innerHTML = `<p>${escapeHtml(content)}</p>`;
        } else {
            contentDiv.appendChild(content);
        }

        if (isUser) {
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(iconDiv);
        } else {
            messageDiv.appendChild(iconDiv);
            messageDiv.appendChild(contentDiv);
        }

        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showProgress(progress, status) {
        hideProgress();
        const progressDiv = document.createElement('div');
        progressDiv.className = 'message bot-message';
        progressDiv.id = 'progressIndicator';

        const iconDiv = document.createElement('div');
        iconDiv.className = 'message-icon';
        iconDiv.innerHTML = '<i class="fas fa-robot"></i>';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = `
            <div class="progress-status" style="margin-bottom: 0.5rem;">${escapeHtml(status)}</div>
            <div class="progress-container">
                <div class="progress-bar" style="width: ${progress}%"></div>
            </div>
        `;

        progressDiv.appendChild(iconDiv);
        progressDiv.appendChild(contentDiv);
        chatMessages.appendChild(progressDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function updateProgress(progress, status) {
        const progressIndicator = document.getElementById('progressIndicator');
        if (!progressIndicator) return;

        const progressBar = progressIndicator.querySelector('.progress-bar');
        const statusText = progressIndicator.querySelector('.progress-status');

        if (progressBar) progressBar.style.width = `${progress}%`;
        if (statusText) statusText.textContent = status;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideProgress() {
        const progress = document.getElementById('progressIndicator');
        if (progress) {
            progress.remove();
        }
    }

    function showStatus(message, type = 'success') {
        const iconMap = {
            success: '<i class="fas fa-check-circle"></i>',
            error: '<i class="fas fa-exclamation-circle"></i>',
            warning: '<i class="fas fa-triangle-exclamation"></i>',
        };

        const statusDiv = document.createElement('div');
        statusDiv.className = 'message bot-message';

        const iconDiv = document.createElement('div');
        iconDiv.className = 'message-icon';
        iconDiv.innerHTML = iconMap[type] || iconMap.success;

        const contentDiv = document.createElement('div');
        contentDiv.className = `message-content status-message status-${type}`;
        contentDiv.innerHTML = `<p>${escapeHtml(message)}</p>`;

        statusDiv.appendChild(iconDiv);
        statusDiv.appendChild(contentDiv);
        chatMessages.appendChild(statusDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function generateReviewCard(review, query, timestamp, data) {
        const reviewCard = document.createElement('div');
        reviewCard.className = 'review-card';

        const downloadReview = () => {
            const element = document.createElement('a');
            const file = new Blob([review], {type: 'text/markdown'});
            element.href = URL.createObjectURL(file);
            element.download = `review_${query.replace(/\s+/g, '_')}_${timestamp}.md`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            URL.revokeObjectURL(element.href);
        };

        const outputLabel = data.output_file ? data.output_file.replace(/^outputs\//, '') : 'review.md';
        const warningHtml = data.used_fallback_summary
            ? `<div class="review-warning"><strong>Fallback summaries used.</strong> Gemini quota is unavailable, so the review uses local extractive summaries for this run.</div>`
            : '';

        reviewCard.innerHTML = `
            <div class="review-header">
                <div class="review-title">
                    <i class="fas fa-file-alt"></i> Generated Literature Review
                </div>
                <button class="download-btn" type="button">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
            <div class="review-meta">
                <span class="review-badge"><i class="fas fa-book-open"></i> ${escapeHtml(String(data.papers_count || 0))} papers</span>
                <span class="review-badge"><i class="fas fa-clock"></i> ${escapeHtml(timestamp || 'Generated')}</span>
                <span class="review-badge"><i class="fas fa-folder-open"></i> ${escapeHtml(outputLabel)}</span>
            </div>
            ${warningHtml}
            <div class="review-body">${renderMarkdown(review)}</div>
        `;

        const downloadBtn = reviewCard.querySelector('.download-btn');
        if (downloadBtn) {
            downloadBtn.addEventListener('click', downloadReview);
        }

        return reviewCard;
    }

    async function handleUserInput() {
        if (isGenerating) {
            return;
        }

        const query = userInput.value.trim();
        if (!query) {
            showStatus('Please enter a research query to generate a literature review.', 'error');
            return;
        }

        isGenerating = true;
        sendButton.disabled = true;
        userInput.disabled = true;
        setAppStatus('Working', true);
        addMessage(query, true);
        userInput.value = '';

        try {
            showProgress(12, 'Initializing research pipeline...');
            updateProgress(26, `Searching arXiv for "${query}"...`);

            const response = await fetch(`${API_BASE_URL}/generate-review`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query })
            });

            let data = {};
            try {
                data = await response.json();
            } catch (parseError) {
                data = {};
            }

            if (!response.ok) {
                throw new Error(data.error || `Server error: ${response.status}`);
            }

            if (data.error) {
                throw new Error(data.error);
            }

            updateProgress(88, 'Formatting literature review...');
            const reviewContainer = generateReviewCard(data.review, query, data.timestamp, data);

            hideProgress();
            if (data.used_fallback_summary) {
                showStatus('Review generated with fallback summaries because Gemini quota is unavailable.', 'warning');
            } else {
                showStatus('Literature review generated successfully.', 'success');
            }

            addMessage(reviewContainer, false, { variant: 'review-message' });
            setAppStatus('Online', false);
        } catch (error) {
            hideProgress();
            showStatus(error.message || 'Something went wrong while generating the review.', 'error');
            setAppStatus('Attention', false);
            console.error('Generation error:', error);
        } finally {
            isGenerating = false;
            sendButton.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    sendButton.addEventListener('click', handleUserInput);

    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !isGenerating) {
            e.preventDefault();
            handleUserInput();
        }
    });

    document.querySelectorAll('.glass-nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.glass-nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });
});
    </script>
</body>
</html>
