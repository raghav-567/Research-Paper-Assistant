<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Paper Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap');

        :root {
            --ink: #101115;
            --ink-soft: #5e6471;
            --line: #d6dbe4;
            --surface: #ffffff;
            --surface-soft: #f3f5fa;
            --tint: #eef3fb;
            --accent: #5e7698;
            --accent-blue-bg: #edf3fc;
            --accent-blue-fg: #3f5f86;
            --accent-blue-line: #c9d7ea;
            --accent-green-bg: #edf7ef;
            --accent-green-fg: #2c6944;
            --accent-green-line: #cfe5d4;
            --accent-amber-bg: #f8f3e8;
            --accent-amber-fg: #7a5d2f;
            --accent-amber-line: #eadfcb;
            --accent-red-bg: #fbeeee;
            --accent-red-fg: #8f3f3f;
            --accent-red-line: #efcfcf;
            --ok: #156f38;
            --warn: #915f17;
            --error: #b33131;
            --shadow: 0 28px 56px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 10px 22px rgba(15, 23, 42, 0.08);
            --radius-xl: 22px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg, #121324 0%, #16152b 100%);
            overflow: auto;
        }

        .page {
            height: 100dvh;
            min-height: 100svh;
            padding: 16px;
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: minmax(0, 1fr);
            overflow: hidden;
        }

        .rail {
            background: #fff;
            border-right: 1px solid var(--line);
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            padding: 14px;
            min-height: 0;
            overflow-y: auto;
        }

        .rail-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid #111;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-soft);
        }

        .rail-top {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .rail-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 2px;
        }

        .rail-brand-label {
            font-family: 'Fraunces', serif;
            font-size: 0.98rem;
            letter-spacing: 0.01em;
            color: #161a23;
        }

        .rail-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rail-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-top: 4px;
        }

        .rail-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-soft);
            color: #1c2230;
            padding: 0.56rem 0.62rem;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .rail-input:focus {
            outline: none;
            border-color: #111;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
        }

        .rail-hint {
            font-size: 0.73rem;
            line-height: 1.35;
            color: #697084;
            padding: 0 2px;
        }

        .rail-keymeta {
            font-size: 0.72rem;
            color: #53617a;
            background: var(--tint);
            border: 1px solid var(--accent-blue-line);
            border-radius: 9px;
            padding: 0.42rem 0.52rem;
            line-height: 1.35;
        }

        .rail-label {
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #7a8190;
            text-transform: uppercase;
            margin: 2px 2px 0;
        }

        .rail-btn {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            color: #313846;
            padding: 0.6rem 0.72rem;
            font-size: 0.86rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            transition: all 0.2s ease;
        }

        .rail-btn:hover {
            border-color: #111;
            background: var(--tint);
            color: #111;
        }

        .rail-btn.active {
            border-color: #111;
            box-shadow: var(--shadow-soft);
            background: #f5f7fb;
            color: #111;
        }

        .rail-btn:disabled {
            opacity: 0.52;
            cursor: not-allowed;
        }

        .rail-btn.action-accent {
            background: var(--accent-blue-bg);
            border-color: var(--accent-blue-line);
            color: var(--accent-blue-fg);
        }

        .rail-btn.action-download {
            background: var(--accent-green-bg);
            border-color: var(--accent-green-line);
            color: var(--accent-green-fg);
        }

        .rail-btn.action-clear {
            background: var(--accent-amber-bg);
            border-color: var(--accent-amber-line);
            color: var(--accent-amber-fg);
        }

        .rail-btn.action-danger {
            background: var(--accent-red-bg);
            border-color: var(--accent-red-line);
            color: var(--accent-red-fg);
        }

        .rail-bottom {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .workspace {
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
            background: radial-gradient(1000px 520px at 80% 90%, #cfe8f4 0%, #edf3f8 50%, #f5f7fc 100%);
            overflow: hidden;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .workspace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(700px 300px at 20% 70%, rgba(194, 214, 245, 0.42) 0%, rgba(194, 214, 245, 0) 80%);
            pointer-events: none;
        }

        .header {
            position: relative;
            z-index: 2;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            padding: 22px 28px 14px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .title {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            line-height: 1.05;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            margin-top: 6px;
            color: var(--ink-soft);
            font-size: 0.94rem;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #111;
            color: #fff;
            border: 1px solid #111;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-chip.status-working {
            background: var(--accent-blue-bg);
            color: var(--accent-blue-fg);
            border-color: var(--accent-blue-line);
        }

        .status-chip.status-attention {
            background: var(--accent-red-bg);
            color: var(--accent-red-fg);
            border-color: var(--accent-red-line);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            animation: pulse 1.8s infinite;
        }

        .status-chip.status-working .status-dot {
            background: var(--accent-blue-fg);
        }

        .status-chip.status-attention .status-dot {
            background: var(--accent-red-fg);
        }

        @keyframes pulse {
            0%,
            100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.45; transform: scale(1.25); }
        }

        .main {
            position: relative;
            z-index: 2;
            flex: 1;
            min-height: 0;
            padding: 22px;
            display: grid;
            place-items: center;
        }

        .panel {
            width: min(920px, 100%);
            height: 100%;
            max-height: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: riseIn 0.35s ease-out;
            min-height: 0;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 13px;
        }

        .message {
            display: flex;
            max-width: 92%;
            animation: fadeIn 0.22s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant,
        .message.status,
        .message.progress,
        .message.review {
            align-self: flex-start;
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--tint);
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            font-size: 0.84rem;
            flex-shrink: 0;
        }

        .message.user .icon {
            order: 2;
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .bubble {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.9rem 1rem;
            line-height: 1.6;
            color: #1c2029;
            font-size: 0.95rem;
        }

        .message.user .bubble {
            background: #111;
            border-color: #111;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble,
        .message.status .bubble,
        .message.progress .bubble,
        .message.review .bubble {
            border-bottom-left-radius: 4px;
        }

        .bubble.status-success {
            border-color: rgba(21, 111, 56, 0.26);
            background: rgba(21, 111, 56, 0.08);
            color: var(--ok);
        }

        .bubble.status-warning {
            border-color: rgba(145, 95, 23, 0.26);
            background: rgba(145, 95, 23, 0.12);
            color: var(--warn);
        }

        .bubble.status-error {
            border-color: rgba(179, 49, 49, 0.26);
            background: rgba(179, 49, 49, 0.08);
            color: var(--error);
        }

        .progress-line {
            margin-top: 10px;
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #edf2f8;
            overflow: hidden;
        }

        .progress-fill {
            height: 7px;
            background: linear-gradient(90deg, #111 0%, #4b617f 100%);
            border-radius: 999px;
            transition: width 0.25s ease;
        }

        .input-row {
            border-top: 1px solid var(--line);
            background: #fff;
            padding: 13px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .query-input {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-soft);
            padding: 0.85rem 0.95rem;
            font-size: 0.94rem;
            color: #131722;
            transition: all 0.2s ease;
        }

        .query-input:focus {
            outline: none;
            border-color: #111;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
        }

        .query-input::placeholder {
            color: #8e95a3;
        }

        .send-btn {
            min-width: 158px;
            border: 1px solid #111;
            border-radius: 999px;
            background: #111;
            color: #fff;
            padding: 0.82rem 1rem;
            font-size: 0.92rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: #fff;
            color: #111;
        }

        .send-btn:disabled {
            opacity: 0.58;
            cursor: not-allowed;
        }

        .review-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.95rem;
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .review-title {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .review-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--tint);
            color: #4f617a;
            padding: 0.32rem 0.62rem;
            font-size: 0.78rem;
        }

        .review-warning {
            border: 1px solid rgba(145, 95, 23, 0.28);
            border-radius: 10px;
            padding: 0.76rem 0.85rem;
            background: rgba(145, 95, 23, 0.11);
            color: var(--warn);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .review-body {
            color: #1f2430;
            line-height: 1.66;
            font-size: 0.94rem;
        }

        .review-body h1,
        .review-body h2,
        .review-body h3 {
            margin: 1rem 0 0.45rem;
            color: #111;
            font-family: 'Fraunces', serif;
        }

        .review-body h1 { font-size: 1.34rem; }
        .review-body h2 { font-size: 1.14rem; }
        .review-body h3 { font-size: 1.02rem; }

        .review-body p { margin: 0.48rem 0; }
        .review-body ul { margin: 0.55rem 0 0.8rem 1.2rem; }
        .review-body li { margin-bottom: 0.28rem; }

        .history-wrap {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 14px;
            display: grid;
            align-content: flex-start;
            gap: 12px;
        }

        .history-item {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.9rem;
        }

        .history-query {
            font-size: 0.98rem;
            font-weight: 600;
            color: #151923;
            margin-bottom: 7px;
        }

        .history-info {
            font-size: 0.84rem;
            color: #697080;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mini-btn {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            padding: 0.36rem 0.72rem;
            font-size: 0.8rem;
            color: #363c49;
            cursor: pointer;
        }

        .mini-btn:hover {
            border-color: #111;
            color: #111;
        }

        .mini-btn.mini-open {
            background: var(--accent-blue-bg);
            border-color: var(--accent-blue-line);
            color: var(--accent-blue-fg);
        }

        .mini-btn.mini-download {
            background: var(--accent-green-bg);
            border-color: var(--accent-green-line);
            color: var(--accent-green-fg);
        }

        .mini-btn.mini-remove {
            background: var(--accent-red-bg);
            border-color: var(--accent-red-line);
            color: var(--accent-red-fg);
        }

        .empty {
            border: 1px dashed var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            color: #6a7181;
            padding: 1rem;
            text-align: center;
            font-size: 0.92rem;
        }

        @media (max-width: 980px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                padding: 10px;
                height: 100dvh;
                min-height: 100svh;
            }

            .rail {
                border-radius: 16px 16px 0 0;
                border-right: none;
                border-bottom: 1px solid var(--line);
                padding: 10px;
                gap: 10px;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .workspace {
                border-radius: 0 0 16px 16px;
            }

            .header {
                padding: 16px;
            }

            .rail-brand-label,
            .rail-label {
                display: none;
            }

            .rail-top,
            .rail-bottom {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }

            .rail-group {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .rail-mark {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                flex-shrink: 0;
            }

            .rail-brand {
                padding: 0;
                flex-shrink: 0;
            }

            .rail-top,
            .rail-bottom {
                gap: 8px;
            }

            .rail-btn {
                width: auto;
                font-size: 0.78rem;
                padding: 0.52rem 0.6rem;
                white-space: nowrap;
            }

            .main {
                padding: 12px;
                min-height: 0;
            }

            .panel {
                height: 100%;
                border-radius: 16px;
            }
        }

        @media (max-width: 640px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .input-row {
                flex-direction: column;
                align-items: stretch;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    {% raw %}
    <script type="text/babel" data-presets="react">
        const { useEffect, useMemo, useRef, useState } = React;
        const API_BASE_URL = window.location.origin;
        const HISTORY_KEY = 'research_assistant_history_v1';

        function uid() {
            return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatInline(text) {
            let escaped = escapeHtml(text);
            escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            escaped = escaped.replace(/`(.+?)`/g, '<code>$1</code>');
            return escaped;
        }

        function renderMarkdown(markdown) {
            const lines = String(markdown || '').split('\n');
            const html = [];
            let inList = false;

            function closeList() {
                if (inList) {
                    html.push('</ul>');
                    inList = false;
                }
            }

            for (const rawLine of lines) {
                const line = rawLine.trim();

                if (!line) {
                    closeList();
                    continue;
                }

                if (line.startsWith('### ')) {
                    closeList();
                    html.push('<h3>' + formatInline(line.slice(4)) + '</h3>');
                    continue;
                }

                if (line.startsWith('## ')) {
                    closeList();
                    html.push('<h2>' + formatInline(line.slice(3)) + '</h2>');
                    continue;
                }

                if (line.startsWith('# ')) {
                    closeList();
                    html.push('<h1>' + formatInline(line.slice(2)) + '</h1>');
                    continue;
                }

                if (line.startsWith('- ') || line.startsWith('* ')) {
                    if (!inList) {
                        html.push('<ul>');
                        inList = true;
                    }
                    html.push('<li>' + formatInline(line.slice(2)) + '</li>');
                    continue;
                }

                closeList();
                html.push('<p>' + formatInline(line) + '</p>');
            }

            closeList();
            return html.join('');
        }

        function downloadReviewFile(query, timestamp, review) {
            const anchor = document.createElement('a');
            const blob = new Blob([review], { type: 'text/markdown' });
            anchor.href = URL.createObjectURL(blob);
            anchor.download = 'review_' + query.replace(/\s+/g, '_') + '_' + timestamp + '.md';
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(anchor.href);
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveHistory(items) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
        }

        function ReviewCard({ reviewData, onDownload }) {
            const warning = reviewData.used_fallback_summary;
            const html = useMemo(() => renderMarkdown(reviewData.review), [reviewData.review]);
            return (
                <div className="review-card">
                    <div className="review-top">
                        <div className="review-title"><i className="fas fa-file-alt" /> Generated Literature Review</div>
                        <button className="mini-btn" onClick={onDownload}><i className="fas fa-download" /> Download</button>
                    </div>
                    <div className="review-meta">
                        <span className="chip"><i className="fas fa-book-open" /> {reviewData.papers_count} papers</span>
                        <span className="chip"><i className="fas fa-clock" /> {reviewData.timestamp || 'Generated'}</span>
                        <span className="chip"><i className="fas fa-folder-open" /> {(reviewData.output_file || 'review.md').replace(/^outputs\//, '')}</span>
                    </div>
                    {warning ? <div className="review-warning"><strong>Fallback summaries used.</strong> Gemini quota was unavailable for this run.</div> : null}
                    <div className="review-body" dangerouslySetInnerHTML={{ __html: html }} />
                </div>
            );
        }

        function App() {
            const [tab, setTab] = useState('generate');
            const [query, setQuery] = useState('');
            const [busy, setBusy] = useState(false);
            const [keyBusy, setKeyBusy] = useState(false);
            const [statusLabel, setStatusLabel] = useState('Online');
            const [apiKeyInput, setApiKeyInput] = useState('');
            const [apiKeyMeta, setApiKeyMeta] = useState({ configured: false, source: 'none', masked_key: '' });
            const [history, setHistory] = useState(() => loadHistory());
            const [chat, setChat] = useState([
                {
                    id: uid(),
                    role: 'assistant',
                    text: 'Hello. Enter a research topic and I will search, summarize, and synthesize a complete literature review.'
                }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [chat]);

            useEffect(() => {
                saveHistory(history);
            }, [history]);

            useEffect(() => {
                refreshApiKeyStatus();
            }, []);

            function pushMessage(item) {
                setChat(prev => [...prev, item]);
            }

            function replaceOrAddProgress(label, value) {
                setChat(prev => {
                    const idx = prev.findIndex(x => x.role === 'progress');
                    if (idx === -1) {
                        return [...prev, { id: uid(), role: 'progress', progress: { label, value } }];
                    }
                    const next = [...prev];
                    next[idx] = { ...next[idx], progress: { label, value } };
                    return next;
                });
            }

            function clearProgress() {
                setChat(prev => prev.filter(x => x.role !== 'progress'));
            }

            async function refreshApiKeyStatus() {
                try {
                    const response = await fetch(API_BASE_URL + '/api-key/status', {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    if (!response.ok) return;
                    const data = await response.json();
                    setApiKeyMeta({
                        configured: Boolean(data.configured),
                        source: data.source || 'none',
                        masked_key: data.masked_key || '',
                    });
                } catch {
                    // no-op for UI status refresh failures
                }
            }

            async function saveApiKey() {
                const key = apiKeyInput.trim();
                if (!key || keyBusy) {
                    return;
                }

                setKeyBusy(true);
                try {
                    const response = await fetch(API_BASE_URL + '/api-key', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ api_key: key }),
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to save Gemini API key.');
                    }
                    setApiKeyInput('');
                    await refreshApiKeyStatus();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'success',
                        text: data.message || 'Gemini API key saved for this session.',
                    });
                    setStatusLabel('Online');
                } catch (err) {
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Unable to save Gemini API key.',
                    });
                    setStatusLabel('Attention');
                } finally {
                    setKeyBusy(false);
                }
            }

            async function clearApiKeySetting() {
                if (keyBusy) return;
                setKeyBusy(true);
                try {
                    const response = await fetch(API_BASE_URL + '/api-key', { method: 'DELETE' });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to clear Gemini API key.');
                    }
                    await refreshApiKeyStatus();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'warning',
                        text: data.message || 'Session API key cleared.',
                    });
                    setStatusLabel('Online');
                } catch (err) {
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Unable to clear Gemini API key.',
                    });
                    setStatusLabel('Attention');
                } finally {
                    setKeyBusy(false);
                }
            }

            async function handleGenerate() {
                const trimmed = query.trim();
                if (!trimmed || busy) return;

                setBusy(true);
                setStatusLabel('Working');
                pushMessage({ id: uid(), role: 'user', text: trimmed });
                setQuery('');

                try {
                    replaceOrAddProgress('Initializing research pipeline...', 14);
                    replaceOrAddProgress('Searching arXiv and analyzing papers...', 35);

                    const response = await fetch(API_BASE_URL + '/generate-review', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: trimmed })
                    });

                    let data = {};
                    try {
                        data = await response.json();
                    } catch {
                        data = {};
                    }

                    if (!response.ok || data.error) {
                        throw new Error(data.error || ('Server error: ' + response.status));
                    }

                    replaceOrAddProgress('Formatting final literature review...', 90);

                    const reviewPayload = {
                        query: trimmed,
                        review: String(data.review || ''),
                        timestamp: String(data.timestamp || ''),
                        papers_count: Number(data.papers_count || 0),
                        output_file: data.output_file,
                        used_fallback_summary: Boolean(data.used_fallback_summary)
                    };

                    clearProgress();

                    pushMessage({
                        id: uid(),
                        role: 'status',
                        text: reviewPayload.used_fallback_summary
                            ? 'Review generated with fallback summaries because Gemini quota is unavailable.'
                            : 'Literature review generated successfully.',
                        statusType: reviewPayload.used_fallback_summary ? 'warning' : 'success'
                    });

                    pushMessage({ id: uid(), role: 'review', review: reviewPayload });

                    setHistory(prev => [
                        { id: uid(), createdAt: new Date().toISOString(), ...reviewPayload },
                        ...prev
                    ].slice(0, 30));

                    setStatusLabel('Online');
                } catch (err) {
                    clearProgress();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Something went wrong while generating the review.'
                    });
                    setStatusLabel('Attention');
                } finally {
                    setBusy(false);
                }
            }

            function clearChat() {
                setChat([
                    {
                        id: uid(),
                        role: 'assistant',
                        text: 'Chat cleared. Enter a new topic when you are ready.'
                    }
                ]);
                setStatusLabel('Online');
            }

            function clearHistory() {
                setHistory([]);
            }

            function openHistoryInChat(item) {
                setTab('generate');
                setChat(prev => [
                    ...prev,
                    { id: uid(), role: 'user', text: item.query },
                    { id: uid(), role: 'review', review: item }
                ]);
            }

            function removeHistory(id) {
                setHistory(prev => prev.filter(x => x.id !== id));
            }

            const lastReview = useMemo(() => {
                for (let i = chat.length - 1; i >= 0; i -= 1) {
                    if (chat[i].role === 'review' && chat[i].review) return chat[i].review;
                }
                return null;
            }, [chat]);

            const statusClass = statusLabel === 'Working'
                ? 'status-working'
                : (statusLabel === 'Attention' ? 'status-attention' : 'status-online');

            return (
                <div className="page">
                    <aside className="rail">
                        <div className="rail-top">
                            <div className="rail-brand">
                                <div className="rail-mark">
                                    <i className="fas fa-microscope" />
                                </div>
                                <div className="rail-brand-label">Controls</div>
                            </div>

                            <div className="rail-group">
                                <div className="rail-label">Navigate</div>
                                <button className={"rail-btn " + (tab === 'generate' ? 'active' : '')} onClick={() => setTab('generate')}>
                                    <i className="fas fa-wand-magic-sparkles" /> Generate
                                </button>
                                <button className={"rail-btn " + (tab === 'history' ? 'active' : '')} onClick={() => setTab('history')}>
                                    <i className="fas fa-clock-rotate-left" /> History
                                </button>
                            </div>

                            <div className="rail-group">
                                <div className="rail-label">Quick Actions</div>
                                <button className="rail-btn action-accent" onClick={() => { setTab('generate'); setQuery('retrieval augmented generation for healthcare'); }}>
                                    <i className="fas fa-lightbulb" /> Use Example Topic
                                </button>
                                <button className="rail-btn action-download" disabled={!lastReview} onClick={() => {
                                    if (lastReview) {
                                        downloadReviewFile(lastReview.query, lastReview.timestamp, lastReview.review);
                                    }
                                }}>
                                    <i className="fas fa-download" /> Download Last Review
                                </button>
                            </div>

                            <div className="rail-group">
                                <div className="rail-label">Gemini API Key</div>
                                <div className="rail-field">
                                    <input
                                        className="rail-input"
                                        type="password"
                                        value={apiKeyInput}
                                        onChange={(e) => setApiKeyInput(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                saveApiKey();
                                            }
                                        }}
                                        placeholder="Paste Gemini API key"
                                        autoComplete="off"
                                    />
                                    <button className="rail-btn action-accent" onClick={saveApiKey} disabled={keyBusy || !apiKeyInput.trim()}>
                                        <i className="fas fa-key" /> {keyBusy ? 'Saving...' : 'Save Key'}
                                    </button>
                                    <button className="rail-btn action-clear" onClick={clearApiKeySetting} disabled={keyBusy || apiKeyMeta.source !== 'session'}>
                                        <i className="fas fa-ban" /> Clear Session Key
                                    </button>
                                </div>
                               
                                <div className="rail-hint">Your key is stored in this browser session only unless an environment key is configured on the server.</div>
                            </div>
                        </div>

                        <div className="rail-bottom">
                            <button className="rail-btn action-clear" onClick={clearChat}>
                                <i className="fas fa-eraser" /> Clear Chat
                            </button>
                            <button className="rail-btn action-danger" onClick={clearHistory} disabled={history.length === 0}>
                                <i className="fas fa-trash" /> Clear History
                            </button>
                        </div>
                    </aside>

                    <main className="workspace">
                        <header className="header">
                            <div className="header-top">
                                <div>
                                    <h1 className="title"><i className="fas fa-microscope" /> Research Synthesis</h1>
                                    <p className="subtitle">Premium black and white interface with purposeful controls only.</p>
                                </div>
                                <div className={"status-chip " + statusClass}><span className="status-dot" /> {statusLabel}</div>
                            </div>
                        </header>

                        <section className="main">
                            <div className="panel">
                                {tab === 'generate' ? (
                                    <>
                                        <div className="chat-scroll" ref={scrollRef}>
                                            {chat.map(item => {
                                                if (item.role === 'review' && item.review) {
                                                    return (
                                                        <div className="message review" key={item.id}>
                                                            <div className="icon"><i className="fas fa-robot" /></div>
                                                            <div className="bubble" style={{ width: '100%', padding: 0, border: 'none', background: 'transparent', boxShadow: 'none' }}>
                                                                <ReviewCard
                                                                    reviewData={item.review}
                                                                    onDownload={() => downloadReviewFile(item.review.query, item.review.timestamp, item.review.review)}
                                                                />
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                if (item.role === 'progress' && item.progress) {
                                                    return (
                                                        <div className="message progress" key={item.id}>
                                                            <div className="icon"><i className="fas fa-robot" /></div>
                                                            <div className="bubble">
                                                                <p>{item.progress.label}</p>
                                                                <div className="progress-line">
                                                                    <div className="progress-fill" style={{ width: item.progress.value + '%' }} />
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                const bubbleClass = item.role === 'status' ? 'bubble status-' + (item.statusType || 'success') : 'bubble';
                                                const icon = item.role === 'user' ? 'fa-user' : (item.role === 'status' ? 'fa-circle-info' : 'fa-robot');

                                                return (
                                                    <div className={"message " + item.role} key={item.id}>
                                                        <div className="icon"><i className={"fas " + icon} /></div>
                                                        <div className={bubbleClass}><p>{item.text}</p></div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="input-row">
                                            <input
                                                className="query-input"
                                                value={query}
                                                onChange={(e) => setQuery(e.target.value)}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && !busy) {
                                                        e.preventDefault();
                                                        handleGenerate();
                                                    }
                                                }}
                                                placeholder="Enter your research topic"
                                                disabled={busy}
                                            />
                                            <button className="send-btn" onClick={handleGenerate} disabled={busy || !query.trim()}>
                                                <i className="fas fa-paper-plane" /> {busy ? 'Generating...' : 'Generate Review'}
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="history-wrap">
                                        {history.length === 0 ? (
                                            <div className="empty">No review history yet. Generate a review to see it here.</div>
                                        ) : (
                                            history.map(item => (
                                                <div className="history-item" key={item.id}>
                                                    <div className="history-query">{item.query}</div>
                                                    <div className="history-info">
                                                        <span><i className="fas fa-clock" /> {item.timestamp || 'Generated'}</span>
                                                        <span><i className="fas fa-book-open" /> {item.papers_count} papers</span>
                                                        <span><i className="fas fa-folder-open" /> {(item.output_file || 'review.md').replace(/^outputs\//, '')}</span>
                                                    </div>
                                                    <div className="history-actions">
                                                        <button className="mini-btn mini-open" onClick={() => openHistoryInChat(item)}>Open in Chat</button>
                                                        <button className="mini-btn mini-download" onClick={() => downloadReviewFile(item.query, item.timestamp, item.review)}>Download</button>
                                                        <button className="mini-btn mini-remove" onClick={() => removeHistory(item.id)}>Remove</button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>
</html>
