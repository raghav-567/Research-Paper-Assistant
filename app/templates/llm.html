<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Paper Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap');

        :root {
            --ink: #101115;
            --ink-soft: #5e6471;
            --line: #d6dbe4;
            --surface: #ffffff;
            --surface-soft: #f3f5fa;
            --tint: #eef3fb;
            --accent: #5e7698;
            --accent-blue-bg: #edf3fc;
            --accent-blue-fg: #3f5f86;
            --accent-blue-line: #c9d7ea;
            --accent-green-bg: #edf7ef;
            --accent-green-fg: #2c6944;
            --accent-green-line: #cfe5d4;
            --accent-amber-bg: #f8f3e8;
            --accent-amber-fg: #7a5d2f;
            --accent-amber-line: #eadfcb;
            --accent-red-bg: #fbeeee;
            --accent-red-fg: #8f3f3f;
            --accent-red-line: #efcfcf;
            --ok: #156f38;
            --warn: #915f17;
            --error: #b33131;
            --shadow: 0 28px 56px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 10px 22px rgba(15, 23, 42, 0.08);
            --radius-xl: 22px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg, #eef1f7 0%, #e7ecf4 100%);
            overflow: auto;
        }

        .page {
            height: 100dvh;
            min-height: 100svh;
            padding: 16px;
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: minmax(0, 1fr);
            overflow: hidden;
        }

        .rail {
            background: #fff;
            border-right: 1px solid var(--line);
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            padding: 22px 18px;
            min-height: 0;
            overflow-y: auto;
        }

        .rail-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(150deg, var(--accent) 0%, var(--accent-blue-fg) 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-soft);
        }

        .rail-top {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .rail-brand {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 0 2px 4px;
        }

        .rail-brand-label {
            font-family: 'Fraunces', serif;
            font-size: 0.98rem;
            letter-spacing: 0.01em;
            color: #161a23;
        }

        .rail-group {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .rail-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        .rail-key-actions {
            display: flex;
            gap: 8px;
        }

        .rail-key-actions .rail-btn {
            flex: 1;
            justify-content: center;
            text-align: center;
            padding: 0.56rem 0.5rem;
        }

        .rail-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-soft);
            color: #1c2230;
            padding: 0.56rem 0.62rem;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .rail-input:focus {
            outline: none;
            border-color: var(--accent-blue-fg);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(63, 95, 134, 0.14);
        }

        .rail-hint {
            font-size: 0.73rem;
            line-height: 1.35;
            color: #697084;
            padding: 0 2px;
        }

        .rail-keymeta {
            font-size: 0.72rem;
            color: #53617a;
            background: var(--tint);
            border: 1px solid var(--accent-blue-line);
            border-radius: 9px;
            padding: 0.42rem 0.52rem;
            line-height: 1.35;
        }

        .rail-label {
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #7a8190;
            text-transform: uppercase;
            margin: 0 2px 2px;
        }

        .rail-keystatus {
            display: flex;
            align-items: flex-start;
            gap: 7px;
            font-size: 0.74rem;
            font-weight: 500;
            border-radius: 9px;
            padding: 0.42rem 0.55rem;
            border: 1px solid var(--line);
            line-height: 1.35;
        }

        .rail-keystatus span {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .rail-keystatus.ok {
            background: var(--accent-green-bg);
            border-color: var(--accent-green-line);
            color: var(--accent-green-fg);
        }

        .rail-keystatus.warn {
            background: var(--accent-amber-bg);
            border-color: var(--accent-amber-line);
            color: var(--accent-amber-fg);
        }

        .rail-keystatus code {
            font-family: ui-monospace, monospace;
            font-size: 0.72rem;
        }

        .rail-btn {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            color: #313846;
            padding: 0.64rem 0.78rem;
            font-size: 0.86rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            transition: all 0.2s ease;
        }

        .rail-btn:hover {
            border-color: var(--accent-blue-line);
            background: var(--tint);
            color: var(--accent-blue-fg);
        }

        .rail-btn.active {
            border-color: var(--accent-blue-line);
            box-shadow: var(--shadow-soft);
            background: var(--accent-blue-bg);
            color: var(--accent-blue-fg);
        }

        .rail-btn:disabled {
            opacity: 0.52;
            cursor: not-allowed;
        }

        .rail-btn.action-accent {
            background: var(--accent-blue-bg);
            border-color: var(--accent-blue-line);
            color: var(--accent-blue-fg);
        }

        .rail-btn.action-download {
            background: var(--accent-green-bg);
            border-color: var(--accent-green-line);
            color: var(--accent-green-fg);
        }

        .rail-btn.action-clear {
            background: var(--accent-amber-bg);
            border-color: var(--accent-amber-line);
            color: var(--accent-amber-fg);
        }

        .rail-btn.action-danger {
            background: var(--accent-red-bg);
            border-color: var(--accent-red-line);
            color: var(--accent-red-fg);
        }

        .rail-bottom {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
        }

        .workspace {
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
            background: radial-gradient(1000px 520px at 80% 90%, #cfe8f4 0%, #edf3f8 50%, #f5f7fc 100%);
            overflow: hidden;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .workspace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(700px 300px at 20% 70%, rgba(194, 214, 245, 0.42) 0%, rgba(194, 214, 245, 0) 80%);
            pointer-events: none;
        }

        .header {
            position: relative;
            z-index: 2;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            padding: 22px 28px 14px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .title {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            line-height: 1.05;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            margin-top: 6px;
            color: var(--ink-soft);
            font-size: 0.94rem;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #111;
            color: #fff;
            border: 1px solid #111;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-chip.status-working {
            background: var(--accent-blue-bg);
            color: var(--accent-blue-fg);
            border-color: var(--accent-blue-line);
        }

        .status-chip.status-attention {
            background: var(--accent-red-bg);
            color: var(--accent-red-fg);
            border-color: var(--accent-red-line);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            animation: pulse 1.8s infinite;
        }

        .status-chip.status-working .status-dot {
            background: var(--accent-blue-fg);
        }

        .status-chip.status-attention .status-dot {
            background: var(--accent-red-fg);
        }

        @keyframes pulse {
            0%,
            100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.45; transform: scale(1.25); }
        }

        .main {
            position: relative;
            z-index: 2;
            flex: 1;
            min-height: 0;
            padding: 22px;
            display: grid;
            place-items: center;
        }

        .panel {
            width: min(920px, 100%);
            height: 100%;
            max-height: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: riseIn 0.35s ease-out;
            min-height: 0;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 13px;
        }

        .message {
            display: flex;
            max-width: 92%;
            animation: fadeIn 0.22s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant,
        .message.status,
        .message.progress,
        .message.review {
            align-self: flex-start;
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--tint);
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            font-size: 0.84rem;
            flex-shrink: 0;
        }

        .message.user .icon {
            order: 2;
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .bubble {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.9rem 1rem;
            line-height: 1.6;
            color: #1c2029;
            font-size: 0.95rem;
        }

        .message.user .bubble {
            background: #111;
            border-color: #111;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble,
        .message.status .bubble,
        .message.progress .bubble,
        .message.review .bubble {
            border-bottom-left-radius: 4px;
        }

        .bubble.status-success {
            border-color: rgba(21, 111, 56, 0.26);
            background: rgba(21, 111, 56, 0.08);
            color: var(--ok);
        }

        .bubble.status-warning {
            border-color: rgba(145, 95, 23, 0.26);
            background: rgba(145, 95, 23, 0.12);
            color: var(--warn);
        }

        .bubble.status-error {
            border-color: rgba(179, 49, 49, 0.26);
            background: rgba(179, 49, 49, 0.08);
            color: var(--error);
        }

        .progress-line {
            margin-top: 10px;
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #edf2f8;
            overflow: hidden;
        }

        .progress-fill {
            height: 7px;
            background: linear-gradient(90deg, #111 0%, #4b617f 100%);
            border-radius: 999px;
            transition: width 0.25s ease;
        }

        .progress-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
        }

        .progress-pct {
            font-variant-numeric: tabular-nums;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--accent-blue-fg);
        }

        .suggest-wrap {
            margin: 2px 6px 4px;
        }

        .suggest-label {
            font-size: 0.78rem;
            color: var(--ink-soft);
            margin-bottom: 8px;
        }

        .suggest-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggest-chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: #36405a;
            padding: 0.44rem 0.78rem;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .suggest-chip:hover {
            border-color: var(--accent-blue-line);
            background: var(--tint);
            color: var(--accent-blue-fg);
            transform: translateY(-1px);
        }

        .input-row {
            border-top: 1px solid var(--line);
            background: #fff;
            padding: 13px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .query-input {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-soft);
            padding: 0.85rem 0.95rem;
            font-size: 0.94rem;
            color: #131722;
            transition: all 0.2s ease;
        }

        .query-input:focus {
            outline: none;
            border-color: var(--accent-blue-fg);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(63, 95, 134, 0.14);
        }

        .query-input::placeholder {
            color: #8e95a3;
        }

        .send-btn {
            min-width: 158px;
            border: 1px solid #111;
            border-radius: 999px;
            background: #111;
            color: #fff;
            padding: 0.82rem 1rem;
            font-size: 0.92rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: #fff;
            color: #111;
        }

        .send-btn:disabled {
            opacity: 0.58;
            cursor: not-allowed;
        }

        .review-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.95rem;
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .review-title {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .review-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--tint);
            color: #4f617a;
            padding: 0.32rem 0.62rem;
            font-size: 0.78rem;
        }

        .review-warning {
            border: 1px solid rgba(145, 95, 23, 0.28);
            border-radius: 10px;
            padding: 0.76rem 0.85rem;
            background: rgba(145, 95, 23, 0.11);
            color: var(--warn);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .review-body {
            color: #1f2430;
            line-height: 1.66;
            font-size: 0.94rem;
        }

        .review-body h1,
        .review-body h2,
        .review-body h3 {
            margin: 1rem 0 0.45rem;
            color: #111;
            font-family: 'Fraunces', serif;
        }

        .review-body h1 { font-size: 1.34rem; }
        .review-body h2 { font-size: 1.14rem; }
        .review-body h3 { font-size: 1.02rem; }

        .review-body p { margin: 0.48rem 0; }
        .review-body ul,
        .review-body ol { margin: 0.55rem 0 0.8rem 1.25rem; }
        .review-body li { margin-bottom: 0.32rem; }
        .review-body em { font-style: italic; }

        .review-body a {
            color: var(--accent-blue-fg);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
            word-break: break-word;
        }

        .review-body a:hover { color: var(--ink); }

        .review-body code {
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 5px;
            padding: 0.05rem 0.32rem;
            font-size: 0.86em;
            font-family: 'Fraunces', ui-monospace, monospace;
        }

        /* References render as a numbered list; tighten their spacing and dim
           the trailing arXiv links so titles stay the focus. */
        .review-body h2 + ol li { color: #2a3140; }

        .history-wrap {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 14px;
            display: grid;
            align-content: flex-start;
            gap: 12px;
        }

        .history-item {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            box-shadow: var(--shadow-soft);
            padding: 0.9rem;
        }

        .history-query {
            font-size: 0.98rem;
            font-weight: 600;
            color: #151923;
            margin-bottom: 7px;
        }

        .history-info {
            font-size: 0.84rem;
            color: #697080;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mini-btn {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            padding: 0.36rem 0.72rem;
            font-size: 0.8rem;
            color: #363c49;
            cursor: pointer;
        }

        .mini-btn:hover {
            border-color: var(--accent-blue-line);
            color: var(--accent-blue-fg);
        }

        .mini-btn.mini-open {
            background: var(--accent-blue-bg);
            border-color: var(--accent-blue-line);
            color: var(--accent-blue-fg);
        }

        .mini-btn.mini-download {
            background: var(--accent-green-bg);
            border-color: var(--accent-green-line);
            color: var(--accent-green-fg);
        }

        .mini-btn.mini-remove {
            background: var(--accent-red-bg);
            border-color: var(--accent-red-line);
            color: var(--accent-red-fg);
        }

        .empty {
            border: 1px dashed var(--line);
            border-radius: var(--radius-md);
            background: #fff;
            color: #6a7181;
            padding: 1rem;
            text-align: center;
            font-size: 0.92rem;
        }

        @media (max-width: 980px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                padding: 10px;
                height: 100dvh;
                min-height: 100svh;
            }

            .rail {
                border-radius: 16px 16px 0 0;
                border-right: none;
                border-bottom: 1px solid var(--line);
                padding: 10px;
                gap: 10px;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .workspace {
                border-radius: 0 0 16px 16px;
            }

            .header {
                padding: 16px;
            }

            .rail-brand-label,
            .rail-label {
                display: none;
            }

            .rail-top,
            .rail-bottom {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }

            .rail-group {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .rail-mark {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                flex-shrink: 0;
            }

            .rail-brand {
                padding: 0;
                flex-shrink: 0;
            }

            .rail-top,
            .rail-bottom {
                gap: 8px;
            }

            .rail-btn {
                width: auto;
                font-size: 0.78rem;
                padding: 0.52rem 0.6rem;
                white-space: nowrap;
            }

            .main {
                padding: 12px;
                min-height: 0;
            }

            .panel {
                height: 100%;
                border-radius: 16px;
            }
        }

        @media (max-width: 640px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .input-row {
                flex-direction: column;
                align-items: stretch;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.28.5/babel.min.js"></script>

    <!-- Optional seed data. Present only in the static (Vercel) demo build;
         when it sets window.SEED_REVIEWS the app runs in backend-free demo mode.
         In the Flask app this resolves to an empty no-op response. -->
    <script src="seed-data.js"></script>

    {% raw %}
    <script type="text/babel" data-presets="react">
        const { useEffect, useMemo, useRef, useState } = React;
        const API_BASE_URL = window.location.origin;
        const HISTORY_KEY = 'research_assistant_history_v1';

        // Demo mode: when seed data is injected (static build), the app serves
        // pre-generated reviews instead of calling the backend.
        const SEED_REVIEWS = Array.isArray(window.SEED_REVIEWS) ? window.SEED_REVIEWS : null;
        const DEMO_MODE = !!(SEED_REVIEWS && SEED_REVIEWS.length);

        const DEFAULT_TOPICS = [
            'retrieval augmented generation for healthcare',
            'diffusion models for protein design',
            'mixture-of-experts scaling laws',
        ];
        // In demo mode, surface the topics we actually have seed data for.
        const EXAMPLE_TOPICS = DEMO_MODE ? SEED_REVIEWS.map(s => s.query) : DEFAULT_TOPICS;

        function uid() {
            return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        }

        // Pick the seed review whose topic/keywords best overlap the query.
        // Falls back to the first seed so any query still returns something.
        function findSeedReview(query) {
            if (!SEED_REVIEWS || !SEED_REVIEWS.length) return null;
            const q = String(query || '').toLowerCase();
            const qWords = q.split(/[^a-z0-9]+/).filter(w => w.length > 2);
            let best = SEED_REVIEWS[0];
            let bestScore = -1;
            for (const s of SEED_REVIEWS) {
                const hay = (s.query + ' ' + ((s.keywords || []).join(' '))).toLowerCase();
                let score = 0;
                for (const w of qWords) if (hay.includes(w)) score += 1;
                if (hay.includes(q) || q.includes(String(s.query).toLowerCase())) score += 5;
                if (score > bestScore) { bestScore = score; best = s; }
            }
            return best;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatInline(text) {
            let s = escapeHtml(text);
            // Bold first so its asterisks don't get caught by the italic rule.
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Markdown links [label](url) — only allow http(s) destinations.
            s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, url) => {
                const safe = /^https?:\/\//i.test(url) ? url : '#';
                return '<a href="' + safe + '" target="_blank" rel="noopener noreferrer">' + label + '</a>';
            });
            s = s.replace(/\*(?!\s)([^*]+?)\*/g, '<em>$1</em>');
            s = s.replace(/`(.+?)`/g, '<code>$1</code>');
            return s;
        }

        function renderMarkdown(markdown) {
            const lines = String(markdown || '').split('\n');
            const html = [];
            let listType = null; // 'ul' | 'ol' | null

            function closeList() {
                if (listType) {
                    html.push('</' + listType + '>');
                    listType = null;
                }
            }

            function openList(type) {
                if (listType !== type) {
                    closeList();
                    html.push('<' + type + '>');
                    listType = type;
                }
            }

            for (const rawLine of lines) {
                const line = rawLine.trim();

                if (!line) {
                    closeList();
                    continue;
                }

                if (line.startsWith('### ')) {
                    closeList();
                    html.push('<h3>' + formatInline(line.slice(4)) + '</h3>');
                    continue;
                }

                if (line.startsWith('## ')) {
                    closeList();
                    html.push('<h2>' + formatInline(line.slice(3)) + '</h2>');
                    continue;
                }

                if (line.startsWith('# ')) {
                    closeList();
                    html.push('<h1>' + formatInline(line.slice(2)) + '</h1>');
                    continue;
                }

                const ordered = line.match(/^(\d+)\.\s+(.*)$/);
                if (ordered) {
                    openList('ol');
                    html.push('<li>' + formatInline(ordered[2]) + '</li>');
                    continue;
                }

                if (line.startsWith('- ') || line.startsWith('* ')) {
                    openList('ul');
                    html.push('<li>' + formatInline(line.slice(2)) + '</li>');
                    continue;
                }

                closeList();
                html.push('<p>' + formatInline(line) + '</p>');
            }

            closeList();
            return html.join('');
        }

        function downloadReviewFile(query, timestamp, review) {
            const anchor = document.createElement('a');
            const blob = new Blob([review], { type: 'text/markdown' });
            anchor.href = URL.createObjectURL(blob);
            anchor.download = 'review_' + query.replace(/\s+/g, '_') + '_' + timestamp + '.md';
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(anchor.href);
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveHistory(items) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
        }

        function ReviewCard({ reviewData, onDownload }) {
            const warning = reviewData.used_fallback_summary;
            const html = useMemo(() => renderMarkdown(reviewData.review), [reviewData.review]);
            return (
                <div className="review-card">
                    <div className="review-top">
                        <div className="review-title"><i className="fas fa-file-alt" /> Generated Literature Review</div>
                        <button className="mini-btn" onClick={onDownload}><i className="fas fa-download" /> Download</button>
                    </div>
                    <div className="review-meta">
                        <span className="chip"><i className="fas fa-book-open" /> {reviewData.papers_count} papers</span>
                        <span className="chip"><i className="fas fa-clock" /> {reviewData.timestamp || 'Generated'}</span>
                        <span className="chip"><i className="fas fa-folder-open" /> {(reviewData.output_file || 'review.md').replace(/^outputs\//, '')}</span>
                    </div>
                    {warning ? <div className="review-warning"><strong>Fallback summaries used.</strong> Gemini quota was unavailable for this run.</div> : null}
                    <div className="review-body" dangerouslySetInnerHTML={{ __html: html }} />
                </div>
            );
        }

        function App() {
            const [tab, setTab] = useState('generate');
            const [query, setQuery] = useState('');
            const [busy, setBusy] = useState(false);
            const [keyBusy, setKeyBusy] = useState(false);
            const [statusLabel, setStatusLabel] = useState(DEMO_MODE ? 'Demo' : 'Online');
            const [apiKeyInput, setApiKeyInput] = useState('');
            const [apiKeyMeta, setApiKeyMeta] = useState(
                DEMO_MODE
                    ? { configured: true, source: 'demo', masked_key: '' }
                    : { configured: false, source: 'none', masked_key: '' }
            );
            const [history, setHistory] = useState(() => loadHistory());
            const [chat, setChat] = useState([
                {
                    id: uid(),
                    role: 'assistant',
                    text: DEMO_MODE
                        ? 'Demo mode. Pick an example topic below to see a pre-generated literature review .'
                        : 'Hello. Enter a research topic and I will search, summarize, and synthesize a complete literature review.'
                }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [chat]);

            useEffect(() => {
                saveHistory(history);
            }, [history]);

            useEffect(() => {
                refreshApiKeyStatus();
            }, []);

            function pushMessage(item) {
                setChat(prev => [...prev, item]);
            }

            function replaceOrAddProgress(label, value) {
                setChat(prev => {
                    const idx = prev.findIndex(x => x.role === 'progress');
                    if (idx === -1) {
                        return [...prev, { id: uid(), role: 'progress', progress: { label, value } }];
                    }
                    const next = [...prev];
                    next[idx] = { ...next[idx], progress: { label, value } };
                    return next;
                });
            }

            function clearProgress() {
                setChat(prev => prev.filter(x => x.role !== 'progress'));
            }

            async function refreshApiKeyStatus() {
                if (DEMO_MODE) return; // No backend in demo mode.
                try {
                    const response = await fetch(API_BASE_URL + '/api-key/status', {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    if (!response.ok) return;
                    const data = await response.json();
                    setApiKeyMeta({
                        configured: Boolean(data.configured),
                        source: data.source || 'none',
                        masked_key: data.masked_key || '',
                    });
                } catch {
                    // no-op for UI status refresh failures
                }
            }

            async function saveApiKey() {
                const key = apiKeyInput.trim();
                if (!key || keyBusy) {
                    return;
                }

                setKeyBusy(true);
                try {
                    const response = await fetch(API_BASE_URL + '/api-key', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ api_key: key }),
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to save Gemini API key.');
                    }
                    setApiKeyInput('');
                    await refreshApiKeyStatus();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'success',
                        text: data.message || 'Gemini API key saved for this session.',
                    });
                    setStatusLabel('Online');
                } catch (err) {
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Unable to save Gemini API key.',
                    });
                    setStatusLabel('Attention');
                } finally {
                    setKeyBusy(false);
                }
            }

            async function clearApiKeySetting() {
                if (keyBusy) return;
                setKeyBusy(true);
                try {
                    const response = await fetch(API_BASE_URL + '/api-key', { method: 'DELETE' });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to clear Gemini API key.');
                    }
                    await refreshApiKeyStatus();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'warning',
                        text: data.message || 'Session API key cleared.',
                    });
                    setStatusLabel('Online');
                } catch (err) {
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Unable to clear Gemini API key.',
                    });
                    setStatusLabel('Attention');
                } finally {
                    setKeyBusy(false);
                }
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function pollJob(jobId) {
                // Poll the job status endpoint until the review is done or fails.
                while (true) {
                    await sleep(1500);
                    const response = await fetch(API_BASE_URL + '/generate-review/' + jobId, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });

                    let data = {};
                    try {
                        data = await response.json();
                    } catch {
                        data = {};
                    }

                    if (!response.ok) {
                        throw new Error(data.error || ('Server error: ' + response.status));
                    }

                    if (data.progress) {
                        replaceOrAddProgress(data.progress.label, data.progress.value);
                    }

                    if (data.status === 'done') {
                        return data;
                    }
                    if (data.status === 'error') {
                        throw new Error(data.error || 'Review generation failed.');
                    }
                }
            }

            async function runDemoReview(trimmed) {
                // Simulate the pipeline stages, then resolve from seed data.
                const steps = [
                    ['Searching arXiv for relevant papers...', 24],
                    ['Downloading and parsing PDFs...', 46],
                    ['Embedding chunks and building the RAG index...', 68],
                    ['Retrieving relevant passages and synthesizing...', 88],
                ];
                for (const [label, value] of steps) {
                    replaceOrAddProgress(label, value);
                    await sleep(600);
                }
                const seed = findSeedReview(trimmed) || {};
                return {
                    query: trimmed,
                    review: String(seed.review || 'No demo data is available for this topic.'),
                    timestamp: seed.timestamp || new Date().toISOString().slice(0, 10),
                    papers_count: Number(seed.papers_count || 0),
                    output_file: seed.output_file || 'demo_review.md',
                    used_fallback_summary: Boolean(seed.used_fallback_summary),
                    matched_topic: seed.query || ''
                };
            }

            async function handleGenerate() {
                const trimmed = query.trim();
                if (!trimmed || busy) return;

                setBusy(true);
                setStatusLabel('Working');
                pushMessage({ id: uid(), role: 'user', text: trimmed });
                setQuery('');

                try {
                    replaceOrAddProgress('Initializing research pipeline...', 8);

                    let reviewPayload;
                    if (DEMO_MODE) {
                        reviewPayload = await runDemoReview(trimmed);
                    } else {
                        const response = await fetch(API_BASE_URL + '/generate-review', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ query: trimmed })
                        });

                        let startData = {};
                        try {
                            startData = await response.json();
                        } catch {
                            startData = {};
                        }

                        if (!response.ok || startData.error || !startData.job_id) {
                            throw new Error(startData.error || ('Server error: ' + response.status));
                        }

                        const data = await pollJob(startData.job_id);

                        reviewPayload = {
                            query: trimmed,
                            review: String(data.review || ''),
                            timestamp: String(startData.timestamp || ''),
                            papers_count: Number(data.papers_count || 0),
                            output_file: data.output_file,
                            used_fallback_summary: Boolean(data.used_fallback_summary)
                        };
                    }

                    clearProgress();

                    let statusText;
                    let statusType;
                    if (DEMO_MODE) {
                        const related = reviewPayload.matched_topic
                            && reviewPayload.matched_topic.toLowerCase() !== trimmed.toLowerCase();
                        statusText = related
                            ? ('Demo mode: showing the closest sample review ("' + reviewPayload.matched_topic + '").')
                            : 'Loaded a pre-generated sample review (demo mode).';
                        statusType = 'success';
                    } else {
                        statusText = reviewPayload.used_fallback_summary
                            ? 'Review generated with fallback summaries because Gemini quota is unavailable.'
                            : 'Literature review generated successfully.';
                        statusType = reviewPayload.used_fallback_summary ? 'warning' : 'success';
                    }

                    pushMessage({ id: uid(), role: 'status', text: statusText, statusType });

                    pushMessage({ id: uid(), role: 'review', review: reviewPayload });

                    setHistory(prev => [
                        { id: uid(), createdAt: new Date().toISOString(), ...reviewPayload },
                        ...prev
                    ].slice(0, 30));

                    setStatusLabel(DEMO_MODE ? 'Demo' : 'Online');
                } catch (err) {
                    clearProgress();
                    pushMessage({
                        id: uid(),
                        role: 'status',
                        statusType: 'error',
                        text: (err && err.message) || 'Something went wrong while generating the review.'
                    });
                    setStatusLabel('Attention');
                } finally {
                    setBusy(false);
                }
            }

            function clearChat() {
                setChat([
                    {
                        id: uid(),
                        role: 'assistant',
                        text: 'Chat cleared. Enter a new topic when you are ready.'
                    }
                ]);
                setStatusLabel('Online');
            }

            function clearHistory() {
                setHistory([]);
            }

            function openHistoryInChat(item) {
                setTab('generate');
                setChat(prev => [
                    ...prev,
                    { id: uid(), role: 'user', text: item.query },
                    { id: uid(), role: 'review', review: item }
                ]);
            }

            function removeHistory(id) {
                setHistory(prev => prev.filter(x => x.id !== id));
            }

            const lastReview = useMemo(() => {
                for (let i = chat.length - 1; i >= 0; i -= 1) {
                    if (chat[i].role === 'review' && chat[i].review) return chat[i].review;
                }
                return null;
            }, [chat]);

            // Compact masked key (AIza…h8UA) so a long key never overflows the rail.
            const shortKey = useMemo(() => {
                const k = apiKeyMeta.masked_key || '';
                return k.length > 12 ? k.slice(0, 4) + '…' + k.slice(-4) : k;
            }, [apiKeyMeta.masked_key]);

            const statusClass = statusLabel === 'Working'
                ? 'status-working'
                : (statusLabel === 'Attention' ? 'status-attention' : 'status-online');

            return (
                <div className="page">
                    <aside className="rail">
                        <div className="rail-top">
                            <div className="rail-brand">
                                <div className="rail-mark">
                                    <i className="fas fa-microscope" />
                                </div>
                                <div className="rail-brand-label">Controls</div>
                            </div>

                            <div className="rail-group">
                                <div className="rail-label">Navigate</div>
                                <button className={"rail-btn " + (tab === 'generate' ? 'active' : '')} onClick={() => setTab('generate')}>
                                    <i className="fas fa-wand-magic-sparkles" /> Generate
                                </button>
                                <button className={"rail-btn " + (tab === 'history' ? 'active' : '')} onClick={() => setTab('history')}>
                                    <i className="fas fa-clock-rotate-left" /> History
                                </button>
                            </div>

                            {DEMO_MODE ? (
                            <div className="rail-group">
                                <div className="rail-label">Demo Mode</div>
                                <div className="rail-keystatus ok">
                                    <i className="fas fa-circle-check" />
                                    <span>Sample data · no API key needed</span>
                                </div>
                                <div className="rail-hint">Static demo with pre-generated reviews.</div>
                            </div>
                            ) : (
                            <div className="rail-group">
                                <div className="rail-label">Gemini API Key</div>
                                <div className="rail-field">
                                    <input
                                        className="rail-input"
                                        type="password"
                                        value={apiKeyInput}
                                        onChange={(e) => setApiKeyInput(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                saveApiKey();
                                            }
                                        }}
                                        placeholder="Paste Gemini API key"
                                        autoComplete="off"
                                    />
                                    <div className="rail-key-actions">
                                        <button className="rail-btn action-accent" onClick={saveApiKey} disabled={keyBusy || !apiKeyInput.trim()}>
                                            <i className="fas fa-key" /> {keyBusy ? 'Saving...' : 'Save'}
                                        </button>
                                        <button className="rail-btn action-clear" onClick={clearApiKeySetting} disabled={keyBusy || apiKeyMeta.source !== 'session'}>
                                            <i className="fas fa-ban" /> Clear
                                        </button>
                                    </div>
                                </div>

                                <div className={"rail-keystatus " + (apiKeyMeta.configured ? 'ok' : 'warn')}>
                                    {apiKeyMeta.configured ? (
                                        <>
                                            <i className="fas fa-circle-check" />
                                            <span>Key active · {apiKeyMeta.source}{shortKey ? ' · ' : ''}<code>{shortKey}</code></span>
                                        </>
                                    ) : (
                                        <>
                                            <i className="fas fa-circle-exclamation" />
                                            <span>No API key yet — add one to generate reviews.</span>
                                        </>
                                    )}
                                </div>
                                <div className="rail-hint">Stored server-side for this session only.</div>
                            </div>
                            )}
                        </div>

                        <div className="rail-bottom">
                            <button className="rail-btn action-download" disabled={!lastReview} onClick={() => {
                                if (lastReview) {
                                    downloadReviewFile(lastReview.query, lastReview.timestamp, lastReview.review);
                                }
                            }}>
                                <i className="fas fa-download" /> Download Last Review
                            </button>
                            <button className="rail-btn action-clear" onClick={clearChat}>
                                <i className="fas fa-eraser" /> Clear Chat
                            </button>
                            <button className="rail-btn action-danger" onClick={clearHistory} disabled={history.length === 0}>
                                <i className="fas fa-trash" /> Clear History
                            </button>
                        </div>
                    </aside>

                    <main className="workspace">
                        <header className="header">
                            <div className="header-top">
                                <div>
                                    <h1 className="title"><i className="fas fa-microscope" /> Research Synthesis</h1>
                                    <p className="subtitle">{DEMO_MODE
                                        ? 'Demo mode — pre-generated sample reviews'
                                        : 'Search arXiv, summarize each paper, and synthesize a cited literature review.'}</p>
                                </div>
                                <div className={"status-chip " + statusClass}><span className="status-dot" /> {statusLabel}</div>
                            </div>
                        </header>

                        <section className="main">
                            <div className="panel">
                                {tab === 'generate' ? (
                                    <>
                                        <div className="chat-scroll" ref={scrollRef}>
                                            {chat.map(item => {
                                                if (item.role === 'review' && item.review) {
                                                    return (
                                                        <div className="message review" key={item.id}>
                                                            <div className="icon"><i className="fas fa-robot" /></div>
                                                            <div className="bubble" style={{ width: '100%', padding: 0, border: 'none', background: 'transparent', boxShadow: 'none' }}>
                                                                <ReviewCard
                                                                    reviewData={item.review}
                                                                    onDownload={() => downloadReviewFile(item.review.query, item.review.timestamp, item.review.review)}
                                                                />
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                if (item.role === 'progress' && item.progress) {
                                                    return (
                                                        <div className="message progress" key={item.id}>
                                                            <div className="icon"><i className="fas fa-robot" /></div>
                                                            <div className="bubble" style={{ minWidth: '260px' }}>
                                                                <div className="progress-head">
                                                                    <span>{item.progress.label}</span>
                                                                    <span className="progress-pct">{Math.round(item.progress.value)}%</span>
                                                                </div>
                                                                <div className="progress-line">
                                                                    <div className="progress-fill" style={{ width: item.progress.value + '%' }} />
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                const bubbleClass = item.role === 'status' ? 'bubble status-' + (item.statusType || 'success') : 'bubble';
                                                const icon = item.role === 'user' ? 'fa-user' : (item.role === 'status' ? 'fa-circle-info' : 'fa-robot');

                                                return (
                                                    <div className={"message " + item.role} key={item.id}>
                                                        <div className="icon"><i className={"fas " + icon} /></div>
                                                        <div className={bubbleClass}><p>{item.text}</p></div>
                                                    </div>
                                                );
                                            })}

                                            {!chat.some(m => m.role === 'user') && !busy ? (
                                                <div className="suggest-wrap">
                                                    <div className="suggest-label">Try a topic to get started:</div>
                                                    <div className="suggest-row">
                                                        {EXAMPLE_TOPICS.map(topic => (
                                                            <button
                                                                key={topic}
                                                                className="suggest-chip"
                                                                onClick={() => setQuery(topic)}
                                                            >
                                                                {topic}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : null}
                                        </div>

                                        <div className="input-row">
                                            <input
                                                className="query-input"
                                                value={query}
                                                onChange={(e) => setQuery(e.target.value)}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && !busy) {
                                                        e.preventDefault();
                                                        handleGenerate();
                                                    }
                                                }}
                                                placeholder="Enter your research topic"
                                                disabled={busy}
                                            />
                                            <button className="send-btn" onClick={handleGenerate} disabled={busy || !query.trim()}>
                                                <i className="fas fa-paper-plane" /> {busy ? 'Generating...' : 'Generate Review'}
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="history-wrap">
                                        {history.length === 0 ? (
                                            <div className="empty">No review history yet. Generate a review to see it here.</div>
                                        ) : (
                                            history.map(item => (
                                                <div className="history-item" key={item.id}>
                                                    <div className="history-query">{item.query}</div>
                                                    <div className="history-info">
                                                        <span><i className="fas fa-clock" /> {item.timestamp || 'Generated'}</span>
                                                        <span><i className="fas fa-book-open" /> {item.papers_count} papers</span>
                                                        <span><i className="fas fa-folder-open" /> {(item.output_file || 'review.md').replace(/^outputs\//, '')}</span>
                                                    </div>
                                                    <div className="history-actions">
                                                        <button className="mini-btn mini-open" onClick={() => openHistoryInChat(item)}>Open in Chat</button>
                                                        <button className="mini-btn mini-download" onClick={() => downloadReviewFile(item.query, item.timestamp, item.review)}>Download</button>
                                                        <button className="mini-btn mini-remove" onClick={() => removeHistory(item.id)}>Remove</button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>
</html>
